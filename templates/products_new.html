{% extends "base.html" %}

{% block title %}Repiauto - Nuevo Producto{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Nuevo Producto</h2>

<div class="bg-white rounded-lg shadow p-6">
    <form action="/products" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium">SKU USA</label>
            <input name="sku_usa" class="mt-1 block w-full border p-2 rounded" />
        </div>
        <div>
            <label class="block text-sm font-medium">SKU China</label>
            <input name="sku_china" class="mt-1 block w-full border p-2 rounded" />
        </div>
        <div>
            <label class="block text-sm font-medium">Nombre / Descripción</label>
            <input name="name" required class="mt-1 block w-full border p-2 rounded" />
        </div>
        <div>
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Crear</button>
            <a href="/products" class="ml-2 text-gray-600">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
