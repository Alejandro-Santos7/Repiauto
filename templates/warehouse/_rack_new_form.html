{# _rack_new_form.html — Formulario para nuevo rack en side panel #}
<div class="space-y-4">
    <div class="bg-blue-50 rounded-xl p-4 border border-blue-100 text-center">
        <div class="text-2xl mb-1">➕</div>
        <h4 class="font-bold text-blue-800">Nuevo Rack</h4>
        <p class="text-xs text-blue-600">Piso {{ floor_num }}</p>
    </div>

    <form hx-post="/warehouse/1/floor/{{ floor_num }}/create" hx-target="#racks-grid" hx-swap="outerHTML" class="space-y-3">
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Codigo</label>
            <input type="text" name="full_code" required
                class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono"
                placeholder="1-P{{ floor_num }}-A-1">
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Nombre</label>
            <input type="text" name="custom_name"
                class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="Rack A1">
        </div>
        <button type="submit" class="w-full py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition">
            Crear Rack
        </button>
    </form>
</div>
