{# _destination_search.html — Contenedor de busqueda de destino para mover vidrio #}
<div class="mt-3 border-t border-slate-200 pt-3">
    <label class="block text-xs font-medium text-slate-600 mb-1">Buscar destino:</label>
    <input type="text" name="q"
        class="w-full px-2 py-1.5 text-sm border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none mb-2"
        placeholder="Codigo de ubicacion o nombre..."
        hx-get="/warehouse/1/destinations/search" hx-trigger="keyup changed delay:300ms"
        hx-vals='{"item_id": {{ g.id }}, "qty": {{ g.quantity }}}'
        hx-target="#dest-results-{{ g.id }}" hx-swap="innerHTML"
        hx-indicator="#dest-spinner-{{ g.id }}">
    <div id="dest-spinner-{{ g.id }}" class="htmx-indicator text-xs text-slate-400">Buscando...</div>
    <div id="dest-results-{{ g.id }}" class="space-y-1 max-h-40 overflow-y-auto"></div>
</div>
