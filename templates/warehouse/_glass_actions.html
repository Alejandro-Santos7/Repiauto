{# _glass_actions.html — Acciones sobre un vidrio (vender/mover/eliminar) #}
<div class="p-3 space-y-3">
    <div class="flex items-center gap-2">
        <label class="text-xs font-medium text-slate-500">Cantidad:</label>
        <input id="qty-{{ g.id }}" name="qty" type="number" value="{{ g.quantity }}" min="1" max="{{ g.quantity }}"
            class="w-16 px-2 py-1 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center font-medium">
        <span class="text-xs text-slate-400">de {{ g.quantity }}</span>
    </div>

    <div class="flex gap-1.5">
        <button hx-post="/warehouse/1/glass/{{ g.id }}/sell" hx-include="#qty-{{ g.id }}"
            hx-target="#side-panel-body" hx-swap="innerHTML"
            class="flex-1 px-2 py-2 text-xs font-semibold bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition flex items-center justify-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Vender
        </button>
        <button hx-post="/warehouse/1/glass/{{ g.id }}/move-form" hx-include="#qty-{{ g.id }}"
            hx-target="#move-dest-{{ g.id }}" hx-swap="innerHTML"
            class="flex-1 px-2 py-2 text-xs font-semibold bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition flex items-center justify-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            Mover
        </button>
        <button hx-post="/warehouse/1/glass/{{ g.id }}/delete"
            hx-target="#side-panel-body" hx-swap="innerHTML"
            hx-confirm="Eliminar este vidrio?"
            class="px-3 py-2 text-xs font-semibold bg-red-500 text-white rounded-lg hover:bg-red-600 transition flex items-center justify-center">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
    </div>

    <div id="move-dest-{{ g.id }}"></div>
</div>
