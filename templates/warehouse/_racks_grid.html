{# _racks_grid.html — Grid de racks con RACKtest.svg real repetido #}
{% if racks %}
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-8 gap-4">
    {% for rack in racks %}
    <div class="rack-card cursor-pointer bg-white rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:shadow-lg transition-all p-3"
         hx-get="/warehouse/1/rack/{{ rack.id }}" hx-target="#side-panel-body" hx-swap="innerHTML"
         onclick="openPanel(); showBackBtn('rack-{{ rack.id }}')">
        <div class="flex justify-center mb-2">
            <svg viewBox="0 0 100 100" class="w-16 h-20" xmlns="http://www.w3.org/2000/svg">
                <path d="M 42.246 80.189 L 45.362 38.043 L 47.575 38.043 L 51.265 80.107 L 42.246 80.189 Z"
                    fill="rgba(147,197,253,0.3)" stroke="rgb(147,197,253)" stroke-width="1.5"/>
                <line x1="37.083" y1="80.351" x2="55.368" y2="80.105"
                    stroke="rgb(147,197,253)" stroke-width="1.5"/>
                <line x1="36.917" y1="55.852" x2="54.956" y2="55.77"
                    stroke="rgb(147,197,253)" stroke-width="1.5"/>
            </svg>
        </div>
        <p class="text-center text-xs font-semibold text-slate-700 truncate">{{ rack.display_name }}</p>
        {% if rack.glass_types > 0 %}
        <p class="text-center text-xs text-slate-400">{{ rack.glass_types }} tipo(s)</p>
        {% endif %}
    </div>
    {% endfor %}

    <!-- Boton agregar rack -->
    <button class="border-2 border-dashed border-slate-300 rounded-xl p-3 flex flex-col items-center justify-center gap-1 hover:border-blue-400 hover:bg-blue-50/50 transition cursor-pointer min-h-[140px]"
            hx-get="/warehouse/1/floor/{{ floor_num|default(1) }}/new-form" hx-target="#side-panel-body" hx-swap="innerHTML"
            onclick="openPanel()">
        <svg class="w-6 h-6 text-slate-300 group-hover:text-blue-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span class="text-xs text-slate-400 font-medium">Agregar Rack</span>
    </button>
</div>
{% else %}
<div class="text-center py-12 text-slate-400">
    <div class="text-5xl mb-3">📦</div>
    <p>No hay racks registrados en este piso</p>
    <button class="mt-4 inline-flex items-center gap-1.5 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition"
            hx-get="/warehouse/1/floor/{{ floor_num|default(1) }}/new-form" hx-target="#side-panel-body" hx-swap="innerHTML"
            onclick="openPanel()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Agregar primer Rack
    </button>
</div>
{% endif %}
