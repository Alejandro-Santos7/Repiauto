{% extends "base.html" %}

{% block title %}Repiauto - Mapa de Almacenes{% endblock %}

{% block content %}
<div id="warehouse-app">
    <div class="flex gap-0">
        <div id="warehouse-container" class="flex-1 min-w-0">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <button id="btn-back" onclick="goBack()" class="hidden px-3 py-1.5 text-sm bg-white border border-slate-300 rounded-lg hover:bg-slate-100 transition shadow-sm">
                        ← Volver
                    </button>
                    <a href="/warehouse" hx-get="/warehouse/selector" hx-target="#warehouse-content" hx-swap="innerHTML" onclick="resetNav('selector')" class="text-lg font-bold text-slate-800 hover:text-blue-600 transition">🗺️ Mapa de Almacenes</a>
                </div>
                <button hx-get="/warehouse/unassigned" hx-target="#side-panel-body" hx-swap="innerHTML" onclick="openPanel(); showBackBtn('unassigned')" class="px-3 py-1.5 text-sm bg-amber-100 text-amber-700 border border-amber-200 rounded-lg hover:bg-amber-200 transition">
                    📋 Vidrios sin ubicar
                </button>
            </div>
            <div id="warehouse-content">
                {% block warehouse_content %}{% include "warehouse/selector.html" %}{% endblock %}
            </div>
        </div>

        <div id="side-panel" class="hidden flex-shrink-0 w-96 bg-white border-l border-slate-200 shadow-2xl">
            <div class="flex flex-col" style="min-height: 60vh; max-height: calc(100vh - 130px);">
                <div class="flex justify-between items-center p-4 border-b border-slate-200">
                    <h3 id="side-panel-title" class="font-bold text-slate-800">Detalle</h3>
                    <button onclick="closePanel()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
                </div>
                <div id="side-panel-body" class="flex-1 overflow-y-auto p-4">
                    <p class="text-slate-400 text-center py-8">Selecciona un elemento del mapa</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .warehouse-svg-hover { transition: all 0.2s ease; }
    .warehouse-card:hover .warehouse-svg-hover { transform: scale(1.05); }
    .warehouse-card:hover svg path { stroke-opacity: 1; fill-opacity: 0.6; }
    .rack-card:hover svg path { stroke: rgb(59,130,246); fill: rgba(59,130,246,0.25); }
    .rack-card:hover svg line { stroke: rgb(59,130,246); }
</style>

<script>
    var navHistory = [];
    var currentView = 'selector';

    function navigate(url, viewName) {
        navHistory.push({ html: document.getElementById('warehouse-content').innerHTML, view: currentView });
        currentView = viewName;
        htmx.ajax('GET', url, { target: '#warehouse-content', swap: 'innerHTML' });
        updateBackBtn();
    }

    function goBack() {
        if (navHistory.length > 0) {
            var prev = navHistory.pop();
            document.getElementById('warehouse-content').innerHTML = prev.html;
            htmx.process(document.getElementById('warehouse-content'));
            currentView = prev.view;
            updateBackBtn();
        }
    }

    function showBackBtn(viewName) {
        navHistory.push({ html: document.getElementById('warehouse-content').innerHTML, view: currentView });
        currentView = viewName;
        updateBackBtn();
    }

    function resetNav(viewName) {
        navHistory = [];
        currentView = viewName;
        updateBackBtn();
    }

    function updateBackBtn() {
        var btn = document.getElementById('btn-back');
        if (navHistory.length > 0) {
            btn.classList.remove('hidden');
        } else {
            btn.classList.add('hidden');
        }
    }

    function openPanel() {
        document.getElementById('side-panel').classList.remove('hidden');
    }

    function closePanel() {
        document.getElementById('side-panel').classList.add('hidden');
    }

    function selectFloor(floor) {
        var b1 = document.getElementById('floor-1-btn');
        var b2 = document.getElementById('floor-2-btn');
        if (floor === 1) {
            b1.className = 'px-4 py-2 text-sm rounded-l-lg transition bg-blue-600 text-white';
            b2.className = 'px-4 py-2 text-sm rounded-r-lg transition text-slate-600 hover:bg-slate-50';
        } else {
            b1.className = 'px-4 py-2 text-sm rounded-l-lg transition text-slate-600 hover:bg-slate-50';
            b2.className = 'px-4 py-2 text-sm rounded-r-lg transition bg-blue-600 text-white';
        }
    }

    function toggleGlass(id) {
        var el = document.getElementById(id);
        var arrow = document.getElementById('arrow-' + id);
        if (el) el.classList.toggle('hidden');
        if (el) htmx.process(el);
    }

    document.addEventListener('htmx:afterSettle', function(evt) {
        if (evt.target.id === 'warehouse-content') {
            updateBackBtn();
        }
    });
</script>
{% endblock %}
